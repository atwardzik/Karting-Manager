<h2 style="margin-top: 0">Equipment Management</h2>

<div
    style="display: flex; gap: 30px; align-items: flex-start; flex-wrap: nowrap"
>
    <!-- COLUMN 1: GO-KARTS -->
    <div style="flex: 1; min-width: 280px">
        <h3>Add Go-Kart</h3>

        <form
            id="addGokartForm"
            style="
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-bottom: 30px;
            "
        >
            <input
                type="text"
                id="gokartName"
                placeholder="Go-kart name"
                required
            />
            <button type="submit" class="modifier" style="margin-left: 0">
                Add Go-Kart
            </button>
        </form>

        <h3>Go-Kart List</h3>
        <div
            id="gokartsList"
            style="display: flex; flex-direction: column; gap: 10px"
        >
            Loading...
        </div>
    </div>

    <!-- COLUMN 2: COMPONENTS -->
    <div style="flex: 1; min-width: 280px">
        <h3>Add Component</h3>

        <form
            id="addComponentForm"
            style="
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-bottom: 30px;
            "
        >
            <input
                type="number"
                id="componentType"
                placeholder="Type"
                required
            />
            <input type="number" id="componentMth" placeholder="Engine hours" />
            <input type="number" id="componentMileage" placeholder="Mileage" />

            <input type="date" id="componentDate" required />

            <input
                type="number"
                id="componentGokartId"
                placeholder="Go-kart ID"
            />

            <button type="submit" class="modifier" style="margin-left: 0">
                Add Component
            </button>
        </form>

        <h3>Component List</h3>
        <div
            id="componentsList"
            style="display: flex; flex-direction: column; gap: 10px"
        >
            Loading...
        </div>
    </div>

    <!-- COLUMN 3: FAULTS -->
    <div style="flex: 1; min-width: 280px">
        <h3>Report Fault</h3>

        <form
            id="reportFaultForm"
            style="
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-bottom: 30px;
            "
        >
            <input
                type="number"
                id="faultComponentId"
                placeholder="Component ID"
                required
            />
            <input
                type="text"
                id="faultDescription"
                placeholder="Description"
                required
            />

            <button type="submit" class="modifier" style="margin-left: 0">
                Report Fault
            </button>
        </form>

        <h3>Faults List</h3>
        <div
            id="faultsList"
            style="display: flex; flex-direction: column; gap: 10px"
        >
            Loading...
        </div>
    </div>

    <!-- COLUMN 4: SERVICES -->
    <div style="flex: 1; min-width: 280px">
        <h3>Add Service</h3>

        <form
            id="addServiceForm"
            style="
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-bottom: 30px;
            "
        >
            <input
                type="number"
                id="serviceFaultId"
                placeholder="Fault ID"
                required
            />

            <select id="serviceType" required>
                <option value="repair">Repair</option>
                <option value="replacements">Replacement</option>
            </select>

            <input
                type="text"
                id="serviceDescription"
                placeholder="Description"
            />

            <button type="submit" class="modifier" style="margin-left: 0">
                Log Service
            </button>
        </form>

        <h3>Services List</h3>
        <div
            id="servicesList"
            style="display: flex; flex-direction: column; gap: 10px"
        >
            Loading...
        </div>
    </div>
</div>
