<!doctype html>
<html lang="en">
    <head>
        <title>Karting Manager</title>
        <link rel="icon" type="image/x-icon" href="images/favicon.svg" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />

        <script
            src="https://kit.fontawesome.com/148412e972.js"
            crossorigin="anonymous"
        ></script>

        <script type="module" src="/static/js/main.js"></script>

        <link rel="stylesheet" href="/static/css/main.css" />
        <link rel="stylesheet" href="/static/css/login.css" />
    </head>
    <body>
        <div class="container">
            <div class="nav-menu">
                <div class="top-buttons">
                    <button
                        title="User Management"
                        class="navBtn"
                        onclick="location.href = 'index?view=user'"
                    >
                        <i class="fa-solid fa-user"></i>
                    </button>
                    <button
                        title="Gear Management"
                        class="navBtn"
                        onclick="location.href = 'index?view=gearManagement'"
                    >
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <button
                        title="Events Management"
                        class="navBtn"
                        onclick="location.href = 'index?view=eventsManagement'"
                    >
                        <i class="fa-solid fa-calendar-days"></i>
                    </button>
                    <button
                        title="Karting History"
                        class="navBtn"
                        onclick="location.href = 'index'"
                    >
                        <i class="fa-solid fa-list"></i>
                    </button>
                    <button
                        title="Filtering"
                        class="navBtn"
                        onclick="location.href = 'index?view=filter'"
                    >
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
                <div class="bottom-buttons">
                    <button
                        title="Logout"
                        class="navBtn"
                        onclick="location.href = 'logout'"
                    >
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>
                    <select id="language-select">
                        <option value="en">EN</option>
                        <option value="de">DE</option>
                    </select>
                </div>
            </div>
            <div id="contents"></div>
        </div>
    </body>
</html>
